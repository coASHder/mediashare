<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Share</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a class="nav-brand" href="/">Media<span>Share</span></a>
    <div class="nav-actions" data-auth-nav>
      <a class="btn btn-ghost" href="/login">Login</a>
      <a class="btn btn-primary" href="/upload">
        ＋ Upload
      </a>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <div class="page-header">
      <h1>Shared Moments</h1>
      <p>A gallery of images from around the world.</p>
    </div>

    <div id="gallery" class="grid">
      <div class="spinner"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/auth.js"></script>
  <script>
    async function loadImages() {
      const gallery = document.getElementById('gallery');
      try {
        const res = await fetch('/api/images');
        const images = await res.json();

        if (!images.length) {
          gallery.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🖼️</div>
              <h3>No images yet</h3>
              <p>Be the first to <a href="/upload" style="color:var(--accent)">upload a photo</a>.</p>
            </div>`;
          return;
        }

        gallery.innerHTML = images.map(img => `
          <div class="card" onclick="window.location='/image/${img.id}'">
            <div class="card-thumb">
              <img src="${img.filepath}" alt="${escHtml(img.title)}" loading="lazy" />
            </div>
            <div class="card-body">
              <div class="card-title">${escHtml(img.title)}</div>
              <div class="card-meta">
                ${img.location ? `<span>📍 ${escHtml(img.location)}</span>` : ''}
                ${img.datetime ? `<span>🗓 ${formatDate(img.datetime)}</span>` : ''}
              </div>
              ${img.genre ? `<span class="card-genre">${escHtml(img.genre)}</span>` : ''}
            </div>
          </div>
        `).join('');

      } catch (err) {
        gallery.innerHTML = `<p style="color:var(--danger)">Failed to load images. Is the server running?</p>`;
      }
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(dt) {
      if (!dt) return '';
      try { return new Date(dt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
      catch { return dt; }
    }

    loadImages();
  </script>
</body>
</html>
